version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: sunday
    cooldown:
      default-days: 7
    # Prefix commit messages with "deps" to include dependency updates in patch releases
    commit-message:
      prefix: deps
    groups:
      github-actions:
        patterns: ["*"]

  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
      day: sunday
    cooldown:
      default-days: 7
    # Prefix commit messages with "deps" to include dependency updates in patch releases
    commit-message:
      prefix: deps
    # Group into one PR — also keeps titles lowercase ("bump the nuget group..."),
    # which the commitlint subject-case rule requires (single bumps fail as "Bump X")
    groups:
      nuget:
        patterns: ["*"]
