name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release-please:
    name: Release Please
    if: github.event_name == 'push'
    permissions:
      contents: write # Required to update changelog file
      pull-requests: write # Required to create release PRs
    uses: equinor/ops-actions/.github/workflows/release-please-manifest.yml@792c28d178029e9d2b5ae027e3acbe18da89e9ed # v9.38.2

  build-and-publish:
    name: Build and publish
    needs: release-please
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || needs.release-please.outputs.releases_created == 'true') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read # Required to read the repository contents
      packages: write # Required to publish packages to GitHub Packages
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: "10.x"

      - name: Generate C# from schemas
        run: dotnet run --project tools/SchemaGen --configuration Release

      - name: Build
        run: dotnet build src/Osdu.Schemas/Osdu.Schemas.csproj --configuration Release

      - name: Pack
        run: dotnet pack src/Osdu.Schemas/Osdu.Schemas.csproj --configuration Release --no-build --output nupkgs

      - name: Publish to GitHub Packages
        run: |
          dotnet nuget push nupkgs/*.nupkg \
            --source "https://nuget.pkg.github.com/equinor/index.json" \
            --api-key "${GITHUB_TOKEN}" \
            --skip-duplicate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
